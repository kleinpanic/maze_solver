name: Backlog Correlation

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: backlog-correlation
  cancel-in-progress: false

jobs:
  correlate:
    name: Correlate open issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -e .

      - name: Correlate issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -m maze_solver.automation.correlate_issues --apply --summary | tee "$GITHUB_STEP_SUMMARY"
